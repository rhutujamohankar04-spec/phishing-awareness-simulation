<!DOCTYPE html>
<html>
<head>
<title>Account Security Check</title>

<style>

body{
font-family: Arial;
background:#f0f2f5;
text-align:center;
margin-top:120px;
}

.login-box{
background:white;
padding:25px;
width:320px;
margin:auto;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

input{
width:90%;
padding:10px;
margin:8px;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#1877f2;
color:white;
padding:10px;
width:95%;
border:none;
border-radius:5px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Account Verification</h2>

<p>Your account requires verification.</p>

<form>

<input type="text" placeholder="Email Address">

<input type="password" placeholder="Password">

<button>Login</button>

</form>

</div>

</body>
</html>
